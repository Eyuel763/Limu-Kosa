services:
  - type: web
    name: limu-kosa-api
    env: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: node dist/main.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set this to your PostgreSQL Connection URI on Render
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT secret automatically
      - key: CORS_ORIGINS
        value: "*" # Replace with your Next.js public URL after deploying the frontend
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false # Your ImageKit.io Public Key
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false # Your ImageKit.io Private Key
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false # Your ImageKit.io URL Endpoint
